version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: iyf_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
      MONGO_INITDB_DATABASE: iyf_alumni
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
